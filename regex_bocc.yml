        # ACADEMIAS Y CENTROS DE FORMACIÓN
        # -------------------------------------
        \b(
            academia|academy|acad(?:\.|)?
        )\b(?:@[\w&\.-]{0,40})?
        |
        # -------------------------------------
        # CURSOS Y TALLERES
        # -------------------------------------
        \b(
            curso[s]?(?:@libre[s]?)?|taller(?:es)?|
            capacitaci[oó]n|formaci[oó]n|
            curso@libre|talleres?@comunitarios?
        )\b
        |
        # -------------------------------------
        # CENTROS DE FORMACIÓN / IDIOMAS
        # -------------------------------------
        \b(
            centro|ctro|cen
        )@?(?:de|d[e]?)@?
        (?:
            (?:formaci[oó]n|aprendizaje|idiomas?|lenguas?|
               capacita(?:ci[oó]n|te|do|dos)?|
               desarrollo@humano|talento@humano)
        )\b
        |
        # -------------------------------------
        # IDIOMAS
        # -------------------------------------
        \b(
            idiomas?|lenguas?|language@centers?|
            lc[nm]|inter@?learn|interlearn|
            learn(?:@english)?|
            english@(?:and@french@ins(?:titute)?|institute)|
            COLOMBO@AMERICANO|
            english|french|aleman|italiano|
            mandarin|chino|japones|portugues
        )\b
        |
        # -------------------------------------
        # ARTE Y ACTIVIDADES CREATIVAS
        # -------------------------------------
        \b(
            music[aá]|arte|dibujo|pintura|danza|teatro|
            fotograf[ií]a|escultura|ceramica|artesania|
            escuela@de@(?:arte|m[uú]sica|danza|teatro)|
            conservatorio|bellas@artes?
        )\b
        |
        # -------------------------------------
        # OFICIOS Y HABILIDADES PRÁCTICAS
        # -------------------------------------
        \b(
            cocina|gastronom[ií]a|reposter[ií]a|
            manualidades|costura|bordado|tejido|
            carpinter[ií]a|electricidad|plomer[ií]a|
            mec[aá]nica|soldadura|computaci[oó]n|sistemas
        )\b
        |
        # -------------------------------------
        # DESARROLLO PERSONAL Y ACTIVIDADES COMPLEMENTARIAS
        # -------------------------------------
        \b(
            comunitario|desarrollo@personal|
            liderazgo|emprendimiento|coaching|
            yoga|pilates|meditaci[oó]n|mindfulness
        )\b
      )
