regexes:

  regex_supermercados_grandes_superficies:
    categoria_codigo: D10600
    categoria_nombre: Compras y consumo
    subcategoria_codigo: D10609
    subcategoria_nombre: Supermercados y grandes superficies
    regex: |
      (?ix)
      (
        # Cadenas especificas (considerando separador @)
        tienda@?d1 |
        d1@\w* |
        \bexito\b |
        \bcarulla\b |
        \bolimpica\b |
        \bjumbo\b |
        \bmetro\b |
        \bmakro\b |
        \bsurtimax\b |
        \bara\b |
        euro@(?:supermdo|nuestro|arkadia|supermercado) |
        justo@?[&y]@?bueno |
        merquefacil |

        # Terminos generales
        supermercado |
        super@?mercado |
        hipermercado |
        tienda@?de@?conveniencia |
        minimercado |
        autoservicio |
        \bmarket\b |
        \bmercado\b |
        despensa |
        viveres |
        abarrotes |
        almacen@?de@?cadena
      )
      (?!.*\b(
        # Exclusiones especificas
        farmacia|droguer[ii]a|
        ferreter[ii]a|
        restaurante|comida|
        licorer[ii]a|bar\b|
        panaderia|panader[ii]a|
        carnicer[ii]a|
        veterinaria|pet|mascota
      )\b)

  regex_arriendo:
    categoria_codigo: D10100
    categoria_nombre: Vivienda y Hogar
    subcategoria_codigo: D10101
    subcategoria_nombre: Arriendo
    regex: |
      (?ix)
      (?!.*\b(
        venta|compra|mueble|electro|hipoteca|cr[eé]dito|banco|
        ferreter[ií]a|home@?center|easy|falabella|
        constructora|seguros?|fiduciaria
      )\b)
      \b(
        arriendo|arrendamiento(?:s)?|
        canon@de@arrendamiento|
        alquiler|renta@mensual|lease|
        pago@arriendo|canon@mensual|
        # Empresas inmobiliarias y arrendamiento
        inmobiliaria[s]?|bienes@ra[ií]ces|
        corretaje@inmobiliario|propiedades|
        # Terminos adicionales de arrendamiento
        contrato@de@arriendo|
        dep[oó]sito@de@arriendo|
        fianza|garantia@de@arriendo
      )\b

  regex_hipoteca:
    categoria_codigo: D10100
    categoria_nombre: Vivienda y Hogar
    subcategoria_codigo: D10102
    subcategoria_nombre: Hipoteca
    regex: |
      (?ix)
      (?!.*\b(
        veh[ií]culo|carro|moto|educaci[oó]n|libre@inversi[oó]n|
        seguros?|inmobiliaria@venta
      )\b)
      \b(
        hipoteca|cr[eé]dito@hipotecario|
        prestamo@hipotecario|
        cuota@hipotecaria|
        cuota@cr[eé]dito@hipotecario|
        abono@cr[eé]dito@hipotecario|
        abono@hipoteca|
        cuota@mensual@hipoteca|
        pago@hipoteca@vivienda|
        financiaci[oó]n@vivienda|
        cr[eé]dito@vivienda@VIS|
        subsidio@habitacional|
        leasing@habitacional|
        pago@cartera@leasing|
        pago@obligacion@leasing
      )\b

  regex_servicios_publicos:
    categoria_codigo: D10100
    categoria_nombre: Vivienda y Hogar
    subcategoria_codigo: ""
    subcategoria_nombre: Servicios públicos
    regex: |
      (?ix)
      (?!.*\b(
        restaurante|market|supermercado|tienda|home@?center|easy|ferreter[ií]a|
        gasolina|combustible|eds|aseo@personal|productos@de@aseo|gnv|vehicular
      )\b)
      \b(
        # Agua y acueducto
        agua|acueducto|acuaducto|agua@potable|
        empresa@de@acueducto|eaab|alcantarillado|

        # Energia electrica
        energ[ií]a|energia@el[eé]ctrica|luz|
        electrificadora|electrificadora@de@santander|
        enel|enel-?codensa|codensa|epm|e\.p\.m\.|chec|celsia|
        emcali|essa|afinia|aire|air-e|emsa|essmar|
        electrihuila|electrocosta|cens|enerpereira|
        centrales@electricas@del@cauca|ceo|

        # Gas
        gas|gas@natural|gas@domiciliario|
        surtigas|vanti|alcanos@de@colombia|gascaribe|
        efigas|gases@de@occidente|

        # Aseo
        aseo|recolecci[oó]n@de@basuras?|
        interaseo|lime(?:@s\.a\.)?|promoambiental|
        ciudad@limpia|urbaser|

        # Servicios combinados
        triple@play
      )\b

  regex_internet_telefonia:
    categoria_codigo: D10100
    categoria_nombre: Vivienda y Hogar
    subcategoria_codigo: ""
    subcategoria_nombre: Internet y telefonía
    regex: |
      (?ix)
      (?!.*\b(
        celular|equipo|iphone|samsung|venta|tienda|accesorios?
      )\b)
      \b(
        # Internet
        banda@ancha|fibra@[oó]ptica|wifi|wi-?fi|
        conexi[oó]n@de@datos|internet|
        internet@(?:fijo|inalambrico|hogar|residencial|empresarial)|
        servicio@de@internet|proveedor(?:es)?@de@internet|
        conectividad@(?:hogar|rural|empresarial)?|

        # Planes
        plan@de@datos|plan@pospago|plan@prepago|
        paquete[s]?|bolsa|tiempo|
        compra@de@(?:minutos|datos|megas|gigas)|
        minutos@ilimitados|datos@ilimitados|

        # Telefonia
        telefon[ií]a@fija|telefon[ií]a@m[oó]vil|

        # Recargas
        recarga@celular|recarga[s]?@celulares|
        recarga@(?:celular|m[oó]vil|prepago)|

        # Operadores
        claro|tigo|movistar|wom|etb|comcel|avantel|
        virgin@mobile|flash@mobile|directv|hughesnet|
        emcali|une|tigo@une|

        # ISP locales
        compu@?r?edes?|interred|inter@?red|netline|net@?line|
        netcol|global@?net|globalnet|supernet|compuredes|tdatos|
        red@(?:comunicaciones|digital)|telered|celerity|

        # Telecomunicaciones
        servicio@de@telecomunicaciones|comunicacion(?:es)?|
        telecomunicaciones|soluciones?@de?@comunicaciones|

        # TV
        tv|(?:tv|internet)@satelital|
        antenas?@(?:de)?@television
      )\b

  regex_mantenimiento_hogar:
    categoria_codigo: D10100
    categoria_nombre: Vivienda y Hogar
    subcategoria_codigo: ""
    subcategoria_nombre: Mantenimiento del hogar
    regex: |
      (?ix)
      (?!.*\b(
        ferreter[ií]a|material(es)?|compra|venta|home@?center|easy|
        constructor(a)?|almac[eé]n|distribuidora
      )\b)
      \b(
        mantenimiento|reparaciones?|
        arreglos?@locativos|
        plomer[ií]a|fontaner[ií]a|
        electricidad|electricista|
        pintura|pintor|pinturas?|
        remodelaci[oó]n|obra@civil|
        mantenimiento@hogar|
        reparaci[oó]n@vivienda|

        # Acabados
        acabados?(?:@\w+)?|
        drywall|enchapes@y@apliques|

        # Instalaciones
        instalaci[oó]n@de@pisos|
        instalaci[oó]n@de@baldosas|
        reparaci[oó]n@de@techos|
        impermeabilizaci[oó]n|
        resane@de@paredes|

        # Mejoras
        estuco|masilla|soldadura|
        mejoras@locativas|
        adecuaciones?@hogar|
        reforma@ba[ñn]o|reforma@cocina
      )\b

  regex_seguridad_privada:
    categoria_codigo: D10100
    categoria_nombre: Vivienda y Hogar
