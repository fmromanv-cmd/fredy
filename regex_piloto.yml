  # ============================================================
  # CDT – CONSTITUCIÓN / APERTURA / DÉBITO A CDT
  # (salidas de dinero haciaS CDT)
  # ============================================================
  regex_cdt: 
    categoria_codigo: D10800
    categoria_nombre: Inversión y ahorro
    subcategoria_codigo: D10801
    subcategoria_nombre: CDT
    regex: |
      (?ix)
      ^
      (?!.*\b(
          abono |
          interes(?:es)? |
          rendimiento |
          rentabilidad |
          cancelaci[oó]n |
          redenci[oó]n |
          desinversi[oó]n |
          prescrip |
          vencimiento |
          pago@cdt |
          retorno |
          liquidaci[oó]n
      )\b)
      (
          # ------------------------------------------------
          # Constitución / apertura CDT
          # ------------------------------------------------
          constituci[oó]n@cdt |
          apertura@cdt |
          apertura@de@cdt |
          inversion@cdt |
          inversi[oó]n@en@cdt |
          colocaci[oó]n@cdt |
          compra@cdt |
          adquisici[oó]n@cdt |
          # ------------------------------------------------
          # Débitos explícitos
          # ------------------------------------------------
          debito@cdt |
          debito@por@cdt |
          cargo@cdt |
          cargo@por@cdt |
          # ------------------------------------------------
          # Transferencias a CDT
          # ------------------------------------------------
          transferencia@a@cdt |
          traslado@a@cdt |
          traslado@inversion@cdt |
          # ------------------------------------------------
          # CDT desmaterializado (entrada a inversión)
          # ------------------------------------------------
          cdt@desmaterializado(?!.*capital) |
          constituci[oó]n@cdt@desmaterializado |
          # ------------------------------------------------
          # Variantes abreviadas / bancarias
          # ------------------------------------------------
          inv\.@?cdt |
          inv@cdt |
          cdt@inversion |
          cdt@constitucion
      )

  # ============================================================
  # AHORROS E INVERSIONES – DÉBITOS (NO CDT)
  # Fiducia / Fondos / Carteras / Ahorro programado
  # ============================================================
  regex_inversiones:
    categoria_codigo: D10800
    categoria_nombre: Inversión y ahorro
    subcategoria_codigo: D10802
    subcategoria_nombre: Inversiones
    regex: |
      (?ix)
      ^
      (?!.*\b(
          cdt |
          certificado@de@deposito |
          apertura@cdt |
          aumento@de@capital@de@cdt |
          constituci[oó]n@cdt |
          inversion@cdt
      )\b)
      (
          # ------------------------------------------------
          # 1. Inversiones fiduciarias / fondos
          # ------------------------------------------------
          cargo@transferencia@inversion(?:/|y)?desinversion.*fiducia |
          transferencia@a@fiducia |
          inversion@fiducia |
          inversi[oó]n@en@fiducia |
          fiducia(?:ria)?@inversion |
          # ------------------------------------------------
          # 2. Carteras colectivas / encargos fiduciarios
          # ------------------------------------------------
          db@inversion@cartera@colectiva |
          inversion@cartera@colectiva |
          encargo@fiduciario |
          inversion@encargo@fiduciario |
          # ------------------------------------------------
          # 3. Ahorro programado (débitos)
          # ------------------------------------------------
          cargo@automatico@ahorro@programado |
          debito@automatico@ahorro@programado |
          ahorro@programado@debito |
          # ------------------------------------------------
          # 4. Débitos automáticos hacia fiduciarias
          # ------------------------------------------------
          cargo@por@recaudo@con@debito@automatico.*fiduciaria |
          debito@automatico.*fiducia |
          # ------------------------------------------------
          # 5. Genéricos de inversión (no CDT)
          # ------------------------------------------------
          db@inversion\b |
          debito@inversion\b |
          cargo@inversion\b
      )

  regex_bolsillos:
    categoria_codigo: D10800
    categoria_nombre: Inversion y ahorro
    subcategoria_codigo: D10803
    subcategoria_nombre: Bolsillos
    regex: |
