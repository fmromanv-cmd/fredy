  # ============================================================
  # Categoria: Salud y Bienestar
  # Subcategoria: BELLEZA
  # Servicios estéticos presenciales
  # Ej: peluquerías, barberías, spa, uñas, cejas, pestañas,
  # masajes, depilación, estética corporal, sauna, turcos.
  # Se paga por un SERVICIO estético.
  # ============================================================
  # ============================================================
  # Categoria: Salud y Bienestar
  # Subcategoria: SALUD COMPLEMENTARIA
  # Planes complementarios, medicina prepagada, pólizas de salud,
  # asistencias médicas y servicios de ambulancia.
  # Ej: Sura medicina prepagada, Colsanitas, MedPlus,
  # plan complementario Compensar, ambulancias, emergencias médicas.
  # ============================================================
  regex_salud_complementaria: 
    categoria_codigo: D10300
    categoria_nombre: Salud y Bienestar
    subcategoria_codigo: D10301
    subcategoria_nombre: Planes y coberturas médicas
    regex: |
      (?ix)
      (
        \b(
          medicina@prepagada |
          med@prepagada |
          prepaga(?:da|do)? |
          plan(?:es)?@complementari[oa]s? |
          plan@complementari[oa] |
          plan@de@salud |
          salud@complementaria |
          eps@complementaria |
          cobertura@en@salud |
          pol[ií]za@de@salud |
          seguro@de@salud |
          asistencia@m[eé]dica |
          asistencia@en@salud |
          ambulancia[s]? |
          traslado@m[eé]dico |
          emergencias?@m[eé]dicas? |
          emergencia@m[eé]dica |
          sura@medicina@prepagada |
          sura@salud |
          colm[eé]dica(?:@prepagada)? |
          colsanitas |
          sanitas |
          medplus |
          emer(?:m[eé])?dica |
          axa@salud |
          axa@colpatria@salud |
          mapfre@salud |
          bol[ií]var@salud |
          seguros@bol[ií]var |
          compensar(?:@salud)? |
          compensar@complementario |
          plan@complementario@compensar |
          coomeva@salud |
          coomeva@emergencia@m[eé]dica |
          (?=.*\bcaja\b)(?=.*\bcompensaci[oó]n\b)
        )\b
        (?!.*\b(
          veterinari[ao]s?|mascota[s]?|animal(es)?|
          gimnasio|gym|
          est[eé]tica|spa|belleza
        )\b)
      )
